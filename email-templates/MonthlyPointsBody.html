<!DOCTYPE html>
<html>
  <head>
    <style>
      .tier-progress {
        background-color: white;
        padding: 20px;
        border-radius: 6px;
        margin-bottom: 20px;
      }
      .progress-bar {
        width: 100%;
        background-color: #f0f0f0;
        border-radius: 10px;
        padding: 3px;
        margin: 10px 0;
      }
      .progress-fill {
        background-color: #2c5282;
        height: 20px;
        border-radius: 8px;
        transition: width 0.5s ease-in-out;
      }
      .tier-benefits {
        display: flex;
        gap: 10px;
        margin-top: 15px;
      }
      .benefit-card {
        flex: 1;
        padding: 10px;
        background-color: #f8f9fa;
        border-radius: 6px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div
      style="
        background-color: #f7f7f7;
        padding: 20px;
        border-radius: 8px;
        margin-bottom: 25px;
      "
    >
      <h2 style="color: #2c5282; font-size: 20px; margin-bottom: 15px">
        Your {{point_name}} Summary
      </h2>

      <p style="font-size: 16px; line-height: 1.6; margin-bottom: 10px">
        Hello {{customer_name}},
      </p>

      <p style="font-size: 16px; line-height: 1.6; margin-bottom: 20px">
        Here's your monthly {{point_name}} statement and achievements update:
      </p>

      <div
        style="
          background-color: white;
          padding: 15px;
          border-radius: 6px;
          margin-bottom: 20px;
        "
      >
        <h3 style="color: #2c5282; font-size: 18px; margin-bottom: 10px">
          Current Status
        </h3>
        <p
          style="
            font-size: 24px;
            font-weight: bold;
            color: #2c5282;
            margin-bottom: 5px;
          "
        >
          {{current_balance}} {{point_name}}
        </p>
        <p style="color: #666; font-size: 14px">Current Balance</p>
      </div>

      {{#if tierStatus}}
      <div class="tier-progress">
        <h3 style="color: #2c5282; font-size: 18px; margin-bottom: 10px">
          Your Tier : <strong>{{current_tier_name}}</strong>
        </h3>
      </div>
      {{/if}}

      <!-- <div style="background-color: white; padding: 15px; border-radius: 6px; margin-bottom: 20px;">
      <h3 style="color: #2c5282; font-size: 18px; margin-bottom: 10px;">Last Month's Activity</h3>
      <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
        <div style="flex: 1; text-align: center; padding: 10px;">
          <p style="font-size: 20px; font-weight: bold; color: #38a169;">+{{points_earned}}</p>
          <p style="color: #666; font-size: 14px;">Points Earned</p>
        </div>
        <div style="flex: 1; text-align: center; padding: 10px;">
          <p style="font-size: 20px; font-weight: bold; color: #e53e3e;">-{{points_spent}}</p>
          <p style="color: #666; font-size: 14px;">Points Spent</p>
        </div>
      </div>
    </div> -->

      <!-- {{#if points_expiring}}
      <div
        style="
          background-color: #fff3cd;
          padding: 15px;
          border-radius: 6px;
          margin-bottom: 20px;
        "
      >
        <h3 style="color: #856404; font-size: 18px; margin-bottom: 10px">
          ⚠️ Points Expiring Soon
        </h3>
        <p style="font-size: 16px; line-height: 1.6">
          <strong>{{points_expiring}} {{point_name}}</strong> will expire on
          {{expiry_date}}. Don't forget to use them before they expire!
        </p>
      </div>
      {{/if}} -->

      <div style="text-align: center; margin-top: 30px">
        <a
          href="{{shop_link}}"
          style="
            background-color: #ef3f42;
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 4px;
            font-size: 16px;
          "
        >
          Shop Now
        </a>
      </div>
    </div>
  </body>
</html>
